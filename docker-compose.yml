services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet_dev
      POSTGRES_DB: fleet_courier
    volumes:
      - fleet_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet_courier"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - fleet_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./fleet-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 4000
      NODE_ENV: production
      API_PREFIX: api/v1
      DATABASE_URL: postgresql://fleet:fleet_dev@postgres:5432/fleet_courier?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-use-long-random-string-in-production}
      JWT_EXPIRES_IN: 8h
      CORS_ORIGIN: http://localhost:3000
      DEFAULT_TENANT_SLUG: g4s-kenya
      RUN_SEED: ${RUN_SEED:-true}
      ONBOARDING_ENABLED: ${ONBOARDING_ENABLED:-true}
      PG_POOL_MAX: ${PG_POOL_MAX:-20}
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4000/api/v1/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      FLEET_BACKEND_URL: http://backend:4000/api/v1
      FLEET_BACKEND_TENANT: g4s-kenya
    ports:
      - "3000:3000"

volumes:
  fleet_pg_data:
  fleet_redis_data:
