services:
  postgres:
    image: postgres:16-alpine
    container_name: fleet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet_dev
      POSTGRES_DB: fleet_courier
    ports:
      - "5433:5432"
    volumes:
      - fleet_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: fleet-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - fleet_redis_data:/data

volumes:
  fleet_pg_data:
  fleet_redis_data:
