# Copy to .github/workflows/deploy-swiftfleet.yml
name: Deploy SwiftFleet Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: |
          docker compose -f docker-compose.yml build
          docker tag fleet-courier-backend:latest swiftfleet-backend:${{ github.sha }}
          docker tag fleet-courier-frontend:latest swiftfleet-frontend:${{ github.sha }}

      - name: Save images
        run: |
          docker save swiftfleet-backend:${{ github.sha }} swiftfleet-frontend:${{ github.sha }} | gzip > images.tar.gz

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SWIFTFLEET_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SWIFTFLEET_SERVER }} >> ~/.ssh/known_hosts

      - name: Upload and deploy
        env:
          SERVER: root@${{ secrets.SWIFTFLEET_SERVER }}
          REMOTE_DIR: /opt/swiftfleet
        run: |
          ssh $SERVER "mkdir -p $REMOTE_DIR"
          scp images.tar.gz docker-compose.prod.yml $SERVER:$REMOTE_DIR/
          ssh $SERVER "cd $REMOTE_DIR && mv docker-compose.prod.yml docker-compose.yml 2>/dev/null || true"
          ssh $SERVER "cd $REMOTE_DIR && gunzip -c images.tar.gz | docker load && rm images.tar.gz"
          ssh $SERVER "cd $REMOTE_DIR && SWIFTFLEET_VERSION=${{ github.sha }} docker compose --env-file .env up -d --remove-orphans"
